name: Sync Upstream

# Detect updates on upstream (Etheirys/Brio) and bring them into main.
#
# Key idea:
#   - Paths listed in FORK_OWNED_PATHS (managed independently by this fork)
#     are never treated as conflicts: the fork's version is always kept.
#     e.g. .github/ ... the fork removed every workflow except release, so
#          upstream changes such as codeql.yml are ignored instead of
#          producing a conflict.
#
# Flow:
#   1. Check whether upstream has new commits (do nothing if not).
#   2. Merge upstream into main. Conflicts under FORK_OWNED_PATHS are auto
#      resolved in the fork's favor.
#   3-a. No real code change (only .github etc.) -> just advance main (no release).
#   3-b. Real code change -> build to verify.
#          success -> push to main -> release (dispatch release-brio.yml).
#          failure -> open a PR for manual handling.
#   3-c. Genuine conflict outside FORK_OWNED_PATHS -> open a PR for manual handling.

on:
  schedule:
    # Every Monday 06:00 UTC (15:00 JST)
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write   # needed to dispatch release-brio.yml (auto release)

env:
  UPSTREAM_REPO: https://github.com/Etheirys/Brio.git
  UPSTREAM_BRANCH: main
  SYNC_BRANCH: sync/upstream
  # Paths this fork manages on its own; keep the fork's version on conflict.
  FORK_OWNED_PATHS: .github

jobs:
  sync:
    runs-on: windows-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Fetch upstream
        shell: bash
        run: |
          git remote add upstream "$UPSTREAM_REPO"
          git fetch upstream "$UPSTREAM_BRANCH"
          git fetch --tags origin

      - name: Check for new upstream commits
        id: check
        shell: bash
        run: |
          NEW=$(git rev-list --count "origin/main..upstream/$UPSTREAM_BRANCH")
          echo "new_commits=$NEW" >> "$GITHUB_OUTPUT"
          echo "New upstream commits: $NEW"

      - name: Merge upstream (auto-resolve fork-owned paths)
        if: steps.check.outputs.new_commits != '0'
        id: prep
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config core.quotepath false

          BASE=$(git rev-parse origin/main)
          git checkout -B autosync "$BASE"

          # Attempt the merge (do not stop on conflict).
          set +e
          git merge --no-ff --no-commit "upstream/$UPSTREAM_BRANCH"
          set -e

          # Force fork-owned paths back to the fork's exact state, discarding ALL
          # upstream changes there. Unlike a per-conflict loop, this also drops
          # upstream files that merged cleanly (new workflows git never flags as a
          # conflict) and undoes git's rename detection (e.g. our release-brio.yml
          # mistaken for upstream's release.yml). The net effect on
          # $FORK_OWNED_PATHS becomes exactly zero, so the GitHub App GITHUB_TOKEN
          # -- which may not create/update .github/workflows files -- can push the
          # result. GITHUB_TOKEN cannot be granted a `workflows` scope, so avoiding
          # any workflow-file change is the only token-free way to push to main.
          git rm -rf -q --ignore-unmatch -- $FORK_OWNED_PATHS
          git checkout "$BASE" -- $FORK_OWNED_PATHS
          git add -A -- $FORK_OWNED_PATHS

          # Still unmerged -> genuine conflict outside fork-owned paths.
          # Commit the merge with conflict markers as-is and push that (NOT raw
          # upstream). Fork-owned paths are already resolved above, so upstream's
          # .github/workflows files are dropped from the tree -- otherwise the
          # GitHub App GITHUB_TOKEN cannot push a branch that adds workflow files.
          if git ls-files -u | grep -q .; then
            echo "state=conflict" >> "$GITHUB_OUTPUT"
            git add -A
            git commit --no-edit >/dev/null 2>&1 \
              || git commit -m "Merge upstream/$UPSTREAM_BRANCH (conflicts to resolve)" >/dev/null
            git push origin "HEAD:refs/heads/$SYNC_BRANCH" --force
            COMMITS=$(git log --pretty=format:'- %h %s' "$BASE..upstream/$UPSTREAM_BRANCH")
            TITLE="Sync upstream: conflicts need manual resolution"
            BODY=$(cat <<EOF
          Merging [Etheirys/Brio](https://github.com/Etheirys/Brio) produced **conflicts** (outside \`$FORK_OWNED_PATHS\`).

          This branch has the merge committed **with conflict markers**. Resolve them manually:
          \`gh pr checkout $SYNC_BRANCH\`, fix the \`<<<<<<<\` / \`=======\` / \`>>>>>>>\` markers, commit, then merge this PR.

          ### Commits to be merged
          $COMMITS
          EOF
          )
            # PR is only a notification; the branch is already pushed above, so
            # never let a PR-permission hiccup fail the whole sync job.
            EXISTING=$(gh pr list --head "$SYNC_BRANCH" --base main --state open --json number --jq '.[0].number' 2>/dev/null || true)
            if [ -n "$EXISTING" ]; then
              gh pr edit "$EXISTING" --title "$TITLE" --body "$BODY" || echo "::warning::Could not update PR #$EXISTING; branch $SYNC_BRANCH is pushed for manual handling."
            else
              gh pr create --base main --head "$SYNC_BRANCH" --title "$TITLE" --body "$BODY" || echo "::warning::Could not create PR; branch $SYNC_BRANCH is pushed for manual handling."
            fi
            echo "Genuine conflict. Branch $SYNC_BRANCH pushed (PR opened if permitted)."
            exit 0
          fi

          # Merge succeeded (clean, or only fork-owned paths resolved).
          git commit --no-edit >/dev/null 2>&1 || true

          # Did the merge change any real code? (after keeping fork's .github etc.)
          if git diff --quiet "$BASE" HEAD; then
            echo "state=infra" >> "$GITHUB_OUTPUT"
            git push origin HEAD:main
            echo "Upstream changed fork-owned paths only. Advanced main, no release."
            exit 0
          fi

          echo "state=build" >> "$GITHUB_OUTPUT"
          echo "Real code changes present. Proceeding to build verification."

      # ---- Build only when state=build (verify the merged working tree) ----

      - name: Update submodules for merged state
        if: steps.prep.outputs.state == 'build'
        shell: bash
        run: git submodule update --init --recursive

      - name: Install .NET
        if: steps.prep.outputs.state == 'build'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        if: steps.prep.outputs.state == 'build'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Restore Dependencies
        if: steps.prep.outputs.state == 'build'
        run: dotnet restore Brio.slnx

      - name: Build (verify)
        if: steps.prep.outputs.state == 'build'
        run: dotnet build Brio.slnx --no-restore /p:Configuration=Release

      - name: Push to main and trigger release
        if: steps.prep.outputs.state == 'build' && success()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build succeeded -> publish the merge result to main.
          git push origin HEAD:main

          # Bump the last segment of the latest tag (vX.Y.Z...) for the new version.
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          LATEST=${LATEST#v}
          if [ -z "$LATEST" ]; then LATEST="0.0.0"; fi
          IFS='.' read -ra P <<< "$LATEST"
          IDX=$(( ${#P[@]} - 1 ))
          P[$IDX]=$(( ${P[$IDX]} + 1 ))
          NEW=$(IFS='.'; echo "${P[*]}")
          echo "New version: v$NEW"

          # workflow_dispatch is triggered even by GITHUB_TOKEN (unlike push/pull_request).
          gh workflow run release-brio.yml --ref main -f version="$NEW"
          echo "Dispatched release-brio.yml with version=$NEW."

      - name: Open PR on build failure
        if: steps.prep.outputs.state == 'build' && failure()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin HEAD:refs/heads/$SYNC_BRANCH --force
          # This repo is a fork, so GITHUB_TOKEN is not granted pull-requests
          # write; the PR is best-effort and must not mask the build failure.
          BODY="Merging upstream succeeded, but the **build failed**. Please investigate. Log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EXISTING=$(gh pr list --head "$SYNC_BRANCH" --base main --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --title "Sync upstream: build failed" --body "$BODY" || echo "::warning::Could not update PR; see branch $SYNC_BRANCH."
          else
            gh pr create --base main --head "$SYNC_BRANCH" --title "Sync upstream: build failed" --body "$BODY" || echo "::warning::Could not create PR; see branch $SYNC_BRANCH."
          fi
